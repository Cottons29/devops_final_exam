---
- name: Deploy Lypheng Application
  hosts: all
  become: yes
  vars:
    project_dir: "{{ project_dir | default(playbook_dir + '/..') }}"

  tasks:
    - name: Backup MySQL database from container
      shell: docker exec lypheng-mysql-1 mysqldump -u root -pHello@123 "B-SOK_Lypheng-db" > {{ project_dir }}/backup.sql
      ignore_errors: yes

    - name: Rebuild Docker image and restart containers
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        build: always
        state: present
      register: compose_output

    - name: Show compose output
      debug:
        var: compose_output

    - name: Wait for application to start
      pause:
        seconds: 15

    - name: Verify application is running
      uri:
        url: "http://localhost:8443/api/profiles"
        method: GET
      register: health_check
      retries: 6
      delay: 10
      until: health_check.status == 200
      ignore_errors: yes

    - name: Display deployment result
      debug:
        msg: >-
          {% if health_check.status is defined and health_check.status == 200 %}
          SUCCESS — App running at http://localhost:8443
          {% else %}
          Containers rebuilt. Check: docker compose -f {{ project_dir }}/docker-compose.yml logs -f
          {% endif %}
