[web]
# For local testing (run on the server itself):
#   localhost ansible_connection=local
#
# For remote SSH (used by GitHub Actions and manual runs):
#   1.2.3.4 ansible_user=cottons ansible_ssh_private_key_file=~/.ssh/id_ed25519
#
# GitHub Actions overrides this file via CLI (-i <host>,), so this file
# is only used for local/manual ansible-playbook runs.
localhost ansible_connection=local
